<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Warm off-white background — matches light theme sidebar -->
  <rect width="32" height="32" rx="7.5" fill="#F5F4EF"/>

  <!-- Pill 1: brand green — running body arc -->
  <rect x="1" y="13" width="24" height="10" rx="5"
        fill="#529961"
        transform="rotate(-38, 13, 18)"/>

  <!-- Pill 2: bright lime — swept-back crest, multiply creates deep green overlap -->
  <rect x="11" y="6" width="18" height="9" rx="4.5"
        fill="#86EFAC"
        transform="rotate(75, 20, 10.5)"
        style="mix-blend-mode: multiply"/>

</svg>
