[[redirects]]
  from = "https://www.aitroop.net/*"
  to = "https://aitroop.net/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/:path/"
  to = "/:path"
  status = 301
  force = false

[build]
  publish = "dist"
  command = "npm run build"
[build.processing.html]
  pretty_urls = false
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
